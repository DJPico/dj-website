<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Pico</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0a0a;
color:white;
text-align:center;
}

header{
background:black;
padding:40px;
}

header h1{
font-size:42px;
letter-spacing:3px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

section{
padding:70px 20px;
}

.hero{
font-size:22px;
}

iframe{
max-width:90%;
}

.social a{
display:inline-block;
margin:10px;
color:white;
text-decoration:none;
font-size:18px;
}

form{
margin-top:20px;
}

input, textarea{
width:80%;
max-width:400px;
padding:12px;
margin:10px;
border:none;
}

button{
padding:12px 25px;
border:none;
background:#ff0066;
color:white;
font-size:16px;
cursor:pointer;
}

footer{
padding:30px;
background:black;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>DJ Pico</h1>

<nav>
<a href="#about">About</a>
<a href="#video">Latest Set</a>
<a href="#events">Events</a>
<a href="#booking">Booking</a>
</nav>

</header>

<section class="hero" id="about">

<p>🎧 Hobby DJ from Carinthia, Austria</p>
<p>🎶 Genres: From Classical to EDM</p>

</section>

<section id="video">

<h2>Latest Video</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/"
frameborder="0"
allowfullscreen>
</iframe>

</section>

<section id="events">

<h2>Upcoming Events</h2>

<p>No events announced yet</p>

</section>

<section class="social">

<h2>Follow DJ Pico</h2>

<a href="https://www.instagram.com/djpico_official/">Instagram</a>

<br>

<a href="https://www.youtube.com/@djpico-offical">YouTube</a>

</section>

<section id="booking">

<h2>Booking</h2>

<p>Email: Djpico@gmx.at</p>

<form action="mailto:Djpico@gmx.at" method="post">

<input type="text" placeholder="Name">

<br>

<input type="email" placeholder="Email">

<br>

<textarea placeholder="Event details"></textarea>

<br>

<button type="submit">Send Booking Request</button>

</form>

</section>

<footer>

<p>© 2026 DJ Pico</p>

</footer>

</html>
